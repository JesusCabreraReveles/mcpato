<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mcpato · señales</title>
  <style>
    :root {
      --bg: #0b0e13;
      --panel: #141a22;
      --panel-2: #1b232e;
      --border: #232d3a;
      --text: #e7edf3;
      --muted: #8b97a6;
      --gold: #f2c14e;
      --green: #2ecc71;
      --amber: #f4a52e;
      --gray: #6b7785;
      --red: #e74c3c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, monospace;
      font-size: 14px;
    }
    header {
      display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
      padding: 18px 24px; border-bottom: 1px solid var(--border); background: var(--panel);
    }
    header .brand { font-weight: 700; letter-spacing: 3px; color: var(--gold); font-size: 18px; }
    header .sub { color: var(--muted); font-size: 12px; }
    .health {
      display: flex; gap: 18px; flex-wrap: wrap; padding: 14px 24px;
      border-bottom: 1px solid var(--border); background: var(--panel-2);
    }
    .metric { display: flex; flex-direction: column; gap: 2px; }
    .metric .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
    .metric .value { font-size: 16px; font-weight: 600; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; }
    .dot.ok { background: var(--green); } .dot.bad { background: var(--red); } .dot.stale { background: var(--amber); }
    main { padding: 20px 24px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 11px 14px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    tbody tr:hover { background: var(--panel); }
    td.mono { font-variant-numeric: tabular-nums; }
    .accion { font-weight: 700; }
    .accion.comprar { color: var(--green); } .accion.vender { color: var(--red); }
    .badge { padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .badge.PENDING { background: rgba(244,165,46,.15); color: var(--amber); }
    .badge.EXECUTED { background: rgba(46,204,113,.15); color: var(--green); }
    .badge.EXPIRED { background: rgba(107,119,133,.15); color: var(--gray); }
    button.exec {
      background: var(--gold); color: #1a1207; border: 0; padding: 6px 12px;
      border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px;
    }
    button.exec:hover { filter: brightness(1.08); }
    .empty { color: var(--muted); text-align: center; padding: 40px; }
    footer { color: var(--muted); font-size: 11px; padding: 14px 24px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <header>
    <span class="brand">MCPATO</span>
    <span class="sub">Organismo financiero evolutivo · señales de acción</span>
  </header>

  <section class="health" id="health">
    <div class="metric"><span class="label">Estado</span><span class="value" id="h-alive">—</span></div>
    <div class="metric"><span class="label">Equity</span><span class="value" id="h-equity">—</span></div>
    <div class="metric"><span class="label">Delta vs inicial</span><span class="value" id="h-delta">—</span></div>
    <div class="metric"><span class="label">Generaciones</span><span class="value" id="h-gen">—</span></div>
    <div class="metric"><span class="label">Última vela</span><span class="value" id="h-candle">—</span></div>
  </section>

  <main>
    <table>
      <thead>
        <tr><th>Fecha</th><th>Instrumento</th><th>Acción</th><th>Status</th><th></th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Aún no hay señales. Llegarán cuando el campeón cambie de postura.</div>
  </main>

  <footer id="footer">Actualizando…</footer>

  <script>
    async function getJSON(url, opts) {
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error(url + " -> " + r.status);
      return r.json();
    }

    function fmtAge(secs) {
      if (secs == null) return "—";
      if (secs < 90) return secs + "s";
      if (secs < 5400) return Math.round(secs / 60) + " min";
      return Math.round(secs / 3600) + " h";
    }

    async function executeSignal(id) {
      try {
        await getJSON(`/api/signals/${id}/execute`, { method: "POST" });
        refresh();
      } catch (e) { console.error(e); }
    }

    function renderHealth(h) {
      const alive = document.getElementById("h-alive");
      let dotClass = h.alive ? (h.candle_stale ? "stale" : "ok") : "bad";
      let text = h.alive ? (h.candle_stale ? "Vivo (datos atrasados)" : "Vivo") : "Muerto";
      alive.innerHTML = `<span class="dot ${dotClass}"></span>${text}`;
      document.getElementById("h-equity").textContent = h.equity != null ? h.equity.toFixed(4) : "—";
      const d = h.delta_vs_initial;
      const de = document.getElementById("h-delta");
      de.textContent = d != null ? (d >= 0 ? "+" : "") + d.toFixed(4) : "—";
      de.style.color = d == null ? "" : (d >= 0 ? "var(--green)" : "var(--red)");
      document.getElementById("h-gen").textContent = h.generation_count;
      document.getElementById("h-candle").textContent = "hace " + fmtAge(h.last_candle_age_secs);
    }

    function renderSignals(signals) {
      const tbody = document.getElementById("rows");
      const empty = document.getElementById("empty");
      tbody.innerHTML = "";
      empty.style.display = signals.length ? "none" : "block";
      for (const s of signals) {
        const tr = document.createElement("tr");
        const btn = s.status_code === "PENDING"
          ? `<button class="exec" onclick="executeSignal(${s.id})">Marcar ejecutada</button>` : "";
        tr.innerHTML =
          `<td class="mono">${s.fecha}</td>` +
          `<td>${s.instrumento}</td>` +
          `<td class="accion ${s.accion}">${s.accion}</td>` +
          `<td><span class="badge ${s.status_code}">${s.status}</span></td>` +
          `<td>${btn}</td>`;
        tbody.appendChild(tr);
      }
    }

    async function refresh() {
      try {
        const [h, signals] = await Promise.all([
          getJSON("/api/health"),
          getJSON("/api/signals"),
        ]);
        renderHealth(h);
        renderSignals(signals);
        document.getElementById("footer").textContent =
          "Actualizado " + new Date().toLocaleTimeString() + " · auto-refresco cada 3s";
      } catch (e) {
        document.getElementById("footer").textContent = "Error de conexión con el daemon: " + e.message;
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
